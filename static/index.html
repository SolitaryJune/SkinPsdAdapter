<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>皮肤 PSD 自动适配工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f9;
      --panel: #ffffff;
      --text: #1d252d;
      --muted: #65717d;
      --line: #d7e0e7;
      --primary: #1876d1;
      --primary-dark: #0f5fae;
      --ok: #138a4d;
      --warn: #b26a00;
      --bad: #b3261e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      font-size: 15px;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 24px auto 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .subtle {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .workspace {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    section,
    .sidebar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .sidebar {
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 650;
    }

    input[type="file"],
    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 10px;
      min-height: 42px;
    }

    input[type="number"],
    input[type="text"] {
      min-height: 36px;
      padding: 7px 8px;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 8px;
      color: var(--text);
      user-select: none;
    }

    .check input {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mini-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .mini-actions button {
      min-height: 36px;
      font-size: 13px;
      padding: 0 8px;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--primary);
      color: #fff;
      min-height: 42px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 680;
      cursor: pointer;
    }

    button:hover { background: var(--primary-dark); }
    button:disabled { background: #8ba2b5; cursor: wait; }
    button.secondary { background: #31475c; }
    button.secondary:hover { background: #243748; }

    .content {
      display: grid;
      gap: 16px;
    }

    .panel-block {
      padding: 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    pre {
      margin: 0;
      max-height: 280px;
      overflow: auto;
      padding: 12px;
      border-radius: 6px;
      background: #101820;
      color: #d8e6ef;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .preview-grid {
      display: grid;
      gap: 14px;
    }

    .preview-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fbfdff;
    }

    .preview-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .preview-card img {
      display: block;
      width: 100%;
      height: auto;
      background:
        linear-gradient(45deg, #e8eef3 25%, transparent 25%),
        linear-gradient(-45deg, #e8eef3 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e8eef3 75%),
        linear-gradient(-45deg, transparent 75%, #e8eef3 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    }

    .status {
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fbfdff;
      line-height: 1.5;
    }

    .status.ok { border-color: #9dd8b7; color: var(--ok); background: #f1fbf5; }
    .status.warn { border-color: #f2cb8c; color: var(--warn); background: #fff8ee; }
    .status.bad { border-color: #efaaa5; color: var(--bad); background: #fff5f4; }

    .source-editor {
      display: grid;
      gap: 12px;
    }

    .source-canvas-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eef3f6;
      max-height: 520px;
    }

    .source-canvas {
      position: relative;
      width: min(100%, 720px);
      min-height: 220px;
      margin: 0 auto;
      user-select: none;
      cursor: crosshair;
      background:
        linear-gradient(90deg, rgba(24, 118, 209, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(24, 118, 209, 0.08) 1px, transparent 1px),
        #fff;
      background-size: 24px 24px;
    }

    .source-canvas img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    .grid-slot {
      position: absolute;
      border: 2px solid #1684c7;
      background: rgba(22, 132, 199, 0.08);
      color: #0b6295;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
    }

    .grid-slot.active {
      border-color: #d6405f;
      background: rgba(214, 64, 95, 0.12);
      color: #b4213f;
    }

    .grid-slot.draft {
      border-style: dashed;
      border-color: #b26a00;
      background: rgba(178, 106, 0, 0.12);
    }

    .slot-table-wrap {
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .slot-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #fff;
    }

    .slot-table th,
    .slot-table td {
      border-bottom: 1px solid var(--line);
      padding: 6px;
      text-align: left;
      white-space: nowrap;
    }

    .slot-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f6f9fb;
      color: var(--muted);
    }

    .slot-table input {
      min-width: 68px;
    }

    @media (max-width: 820px) {
      main { width: min(100vw - 20px, 680px); margin-top: 12px; }
      header { display: block; }
      .workspace { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .checks { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>皮肤 PSD 自动适配工具</h1>
        <p class="subtle">上传 PSD/PSD 压缩包和目标 .bds/.bdi，按键切片后生成预览、PSD 或新底包。</p>
      </div>
      <div id="health" class="status">正在连接本地服务...</div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div class="field">
          <label for="designFile">设计稿 PSD / PSD zip / 图片</label>
          <input id="designFile" type="file" accept=".psd,.zip,.png,.jpg,.jpeg,.webp" />
        </div>

        <div class="field">
          <label for="basePackage">目标底包 .bds / .bdi</label>
          <input id="basePackage" type="file" accept=".bds,.bdi,.zip" />
        </div>

        <div class="field">
          <label>面板</label>
          <div class="checks">
            <label class="check"><input type="checkbox" name="panel" value="py_26" checked />26 键</label>
            <label class="check"><input type="checkbox" name="panel" value="en_26" checked />英文 26</label>
            <label class="check"><input type="checkbox" name="panel" value="py_9" checked />9 键</label>
            <label class="check"><input type="checkbox" name="panel" value="en_9" checked />英文 9</label>
            <label class="check"><input type="checkbox" name="panel" value="bh" checked />笔画</label>
            <label class="check"><input type="checkbox" name="panel" value="num_9" checked />123</label>
            <label class="check"><input type="checkbox" name="panel" value="num_9h" checked />数字扩展</label>
            <label class="check"><input type="checkbox" name="panel" value="symbol" checked />符号</label>
            <label class="check"><input type="checkbox" name="panel" value="hw_grid" checked />手写</label>
          </div>
        </div>

        <div class="field">
          <label for="sizeBasis">面板尺寸</label>
          <select id="sizeBasis">
            <option value="auto">自动识别：按小程序逻辑判断尺寸</option>
            <option value="default">以默认为准：按小程序规则收敛外框</option>
            <option value="image">以图片为准：保留 PNG 实际尺寸</option>
          </select>
        </div>

        <div class="field">
          <label for="layoutBasis">按键定位</label>
          <select id="layoutBasis">
            <option value="ini">INI VIEW_RECT</option>
            <option value="til_scaled">TIL SOURCE_RECT 缩放定位</option>
          </select>
        </div>

        <div class="field">
          <label for="resizeMode">按键缩放</label>
          <select id="resizeMode">
            <option value="stretch">拉伸到目标框</option>
            <option value="cover">等比铺满并裁切</option>
            <option value="contain">等比完整放入</option>
          </select>
        </div>

        <div class="field">
          <label for="layerMode">PSD 导出图层</label>
          <select id="layerMode">
            <option value="source_layers">保留源 PSD 图层</option>
            <option value="panel_layers">每个面板一个图层</option>
            <option value="key_layers">每个按键一个图层</option>
          </select>
        </div>

        <div class="field source-editor">
          <label>源图片模板</label>
          <select id="sourceLayoutMode">
            <option value="none">不使用：按底包比例裁设计图</option>
            <option value="custom">使用手动格子：按源图片格子裁切</option>
          </select>
          <select id="sourcePanelKey">
            <option value="py_26">当前格子面板：26 键</option>
            <option value="en_26">当前格子面板：英文 26</option>
            <option value="py_9">当前格子面板：9 键</option>
            <option value="en_9">当前格子面板：英文 9</option>
            <option value="bh">当前格子面板：笔画</option>
            <option value="num_9">当前格子面板：123</option>
            <option value="num_9h">当前格子面板：数字扩展</option>
            <option value="symbol">当前格子面板：符号</option>
            <option value="hw_grid">当前格子面板：手写</option>
          </select>
          <div class="inline-grid">
            <div>
              <label for="sourceCanvasW">整体宽</label>
              <input id="sourceCanvasW" type="number" min="1" step="1" placeholder="1080" />
            </div>
            <div>
              <label for="sourceCanvasH">整体高</label>
              <input id="sourceCanvasH" type="number" min="1" step="1" placeholder="750" />
            </div>
          </div>
          <div class="inline-grid">
            <div>
              <label for="sourceRatioW">宽比</label>
              <input id="sourceRatioW" type="number" min="1" step="1" placeholder="1080" />
            </div>
            <div>
              <label for="sourceRatioH">高比</label>
              <input id="sourceRatioH" type="number" min="1" step="1" placeholder="750" />
            </div>
          </div>
          <div class="inline-grid">
            <div>
              <label for="sourceImageW">图片宽</label>
              <input id="sourceImageW" type="number" min="1" step="1" placeholder="自动读取" readonly />
            </div>
            <div>
              <label for="sourceImageH">图片高</label>
              <input id="sourceImageH" type="number" min="1" step="1" placeholder="自动读取" readonly />
            </div>
          </div>
          <div class="inline-grid">
            <div>
              <label for="sourceKeyboardX">键盘区 X</label>
              <input id="sourceKeyboardX" type="number" min="0" step="1" placeholder="0" />
            </div>
            <div>
              <label for="sourceKeyboardY">键盘区 Y</label>
              <input id="sourceKeyboardY" type="number" min="0" step="1" placeholder="180" />
            </div>
          </div>
          <div class="inline-grid">
            <div>
              <label for="sourceKeyboardW">键盘区 W</label>
              <input id="sourceKeyboardW" type="number" min="1" step="1" placeholder="1080" />
            </div>
            <div>
              <label for="sourceKeyboardH">键盘区 H</label>
              <input id="sourceKeyboardH" type="number" min="1" step="1" placeholder="570" />
            </div>
          </div>
          <div class="mini-actions">
            <button id="detectImageSizeBtn" type="button" class="secondary">识别图片尺寸</button>
            <button id="applyRatioBtn" type="button" class="secondary">应用宽高比</button>
            <button id="generate26Btn" type="button" class="secondary">生成 26 键格子</button>
            <button id="generateFromBaseBtn" type="button" class="secondary">用底包格子生成</button>
            <button id="addSlotBtn" type="button" class="secondary">新增格子</button>
            <button id="clearSlotsBtn" type="button" class="secondary">清空格子</button>
          </div>
          <div class="status" id="sourceLayoutStatus">可填整体尺寸，也可在右侧画布拖拽画格子。</div>
        </div>

        <label class="check">
          <input id="includePressed" type="checkbox" checked />
          同时替换按压态 HL_IMG
        </label>

        <label class="check" style="margin-top:8px;">
          <input id="darkenPressed" type="checkbox" checked />
          按压态轻微压暗
        </label>

        <div class="actions">
          <button id="analyzeBtn" class="secondary">分析</button>
          <button id="previewBtn">预览</button>
          <button id="psdBtn">导出 PSD</button>
          <button id="packageBtn">导出底包</button>
        </div>
      </aside>

      <div class="content">
        <section class="panel-block">
          <div class="panel-title">
            <h2>状态</h2>
          </div>
          <div id="status" class="status">请选择设计稿和目标底包。</div>
        </section>

        <section class="panel-block">
          <div class="panel-title">
            <h2>分析结果</h2>
          </div>
          <pre id="report">还没有分析。</pre>
        </section>

        <section class="panel-block">
          <div class="panel-title">
            <h2>源图片格子</h2>
            <span id="slotCount" class="subtle">0 个格子</span>
          </div>
          <div class="source-canvas-wrap">
            <div id="sourceCanvas" class="source-canvas">
              <img id="sourceImagePreview" alt="" />
            </div>
          </div>
          <div class="slot-table-wrap" style="margin-top:12px;">
            <table class="slot-table">
              <thead>
                <tr>
                  <th>键名</th>
                  <th>面板</th>
                  <th>X</th>
                  <th>Y</th>
                  <th>W</th>
                  <th>H</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="slotTableBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel-block">
          <div class="panel-title">
            <h2>预览</h2>
          </div>
          <div id="previews" class="preview-grid"></div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const buttons = ["analyzeBtn", "previewBtn", "psdBtn", "packageBtn"].map($);
    const sourceSlots = [];
    let lastAnalyzeData = null;
    let sourcePreviewUrl = "";
    let activeSlotIndex = -1;
    let draftSlot = null;
    let dragStart = null;
    let keyboardRectTouched = false;
    let sourceMappingTouched = false;

    // 这组坐标直接按小程序 packageSkin/shared/keyboard-layout-helper.ts 的 py_26_chinese 模板维护。
    // 前端生成源格子时先映射到“键盘区”，再由后端按源图片实际像素缩放裁切。
    const PY26_POSITION_PRESET = [
      ["Q", 0, 0, 115, 165], ["W", 114, 0, 115, 165], ["E", 228, 0, 115, 165], ["R", 342, 0, 115, 165], ["T", 456, 0, 115, 165],
      ["Y", 570, 0, 115, 165], ["U", 684, 0, 115, 165], ["I", 798, 0, 115, 165], ["O", 912, 0, 115, 165], ["P", 1026, 0, 115, 165],
      ["A", 58, 164, 113, 165], ["S", 170, 164, 113, 165], ["D", 282, 164, 113, 165], ["F", 394, 164, 113, 165], ["G", 506, 164, 113, 165],
      ["H", 618, 164, 113, 165], ["J", 730, 164, 113, 165], ["K", 842, 164, 113, 165], ["L", 954, 164, 113, 165],
      ["大写", 0, 328, 171, 165], ["Z", 170, 328, 113, 165], ["X", 282, 328, 113, 165], ["C", 394, 328, 113, 165],
      ["V", 506, 328, 113, 165], ["B", 618, 328, 113, 165], ["N", 730, 328, 113, 165], ["M", 842, 328, 113, 165], ["删除", 954, 328, 227, 165],
      ["符号", 0, 492, 113, 165], ["123", 112, 492, 113, 165], [",", 224, 492, 113, 165], ["空格", 336, 492, 397, 165],
      [".", 732, 492, 113, 165], ["中/英", 844, 492, 113, 165], ["发送", 956, 492, 171, 165]
    ];

    const PY26_BASE_W = Math.max(...PY26_POSITION_PRESET.map((item) => item[1] + item[3]));
    const PY26_BASE_H = Math.max(...PY26_POSITION_PRESET.map((item) => item[2] + item[4]));

    function setBusy(isBusy) {
      buttons.forEach((button) => { button.disabled = isBusy; });
    }

    function setStatus(text, type = "") {
      const node = $("status");
      node.className = `status ${type}`;
      node.textContent = text;
    }

    function selectedPanels() {
      return Array.from(document.querySelectorAll('input[name="panel"]:checked'))
        .map((item) => item.value)
        .join(",");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function numValue(id, fallback = 0) {
      const value = Number($(id).value);
      return Number.isFinite(value) && value > 0 ? value : fallback;
    }

    function sourceCanvasSize() {
      return {
        width: numValue("sourceCanvasW", 0),
        height: numValue("sourceCanvasH", 0)
      };
    }

    function currentSourcePanelKey() {
      return $("sourcePanelKey").value || "py_26";
    }

    function defaultKeyboardRectForCanvas(canvas) {
      // 参考用户给的逻辑模板：1080*60 + 1080*120 + 1080*570 = 1080*750。
      if (Math.round(canvas.width) === 1080 && Math.round(canvas.height) === 750) {
        return { x: 0, y: 180, w: 1080, h: 570 };
      }
      return { x: 0, y: 0, w: canvas.width || 1080, h: canvas.height || 595 };
    }

    function sourceKeyboardRect() {
      const canvas = sourceCanvasSize();
      const x = Number($("sourceKeyboardX").value);
      const y = Number($("sourceKeyboardY").value);
      const w = Number($("sourceKeyboardW").value);
      const h = Number($("sourceKeyboardH").value);
      return {
        x: Number.isFinite(x) && x >= 0 ? x : 0,
        y: Number.isFinite(y) && y >= 0 ? y : 0,
        w: Number.isFinite(w) && w > 0 ? w : (canvas.width || 1080),
        h: Number.isFinite(h) && h > 0 ? h : (canvas.height || 595)
      };
    }

    function setKeyboardRect(rect, markTouched = false) {
      $("sourceKeyboardX").value = Math.round(rect.x);
      $("sourceKeyboardY").value = Math.round(rect.y);
      $("sourceKeyboardW").value = Math.round(rect.w);
      $("sourceKeyboardH").value = Math.round(rect.h);
      keyboardRectTouched = keyboardRectTouched || markTouched;
    }

    function refreshKeyboardRectDefault() {
      if (!keyboardRectTouched) setKeyboardRect(defaultKeyboardRectForCanvas(sourceCanvasSize()));
    }

    function setSourceLayoutStatus(text, type = "") {
      const node = $("sourceLayoutStatus");
      node.className = `status ${type}`;
      node.textContent = text;
    }

    function buildSourceLayoutPayload() {
      const canvas = sourceCanvasSize();
      if (!canvas.width || !canvas.height) return "";

      const includeSlots = $("sourceLayoutMode").value === "custom" && sourceSlots.length > 0;
      if (!includeSlots && !sourceMappingTouched && !keyboardRectTouched) return "";

      const payload = {
        canvas_width: canvas.width,
        canvas_height: canvas.height,
        slots: includeSlots ? sourceSlots.map((slot) => {
          const x = Math.min(canvas.width - 1, Math.max(0, Math.round(slot.x)));
          const y = Math.min(canvas.height - 1, Math.max(0, Math.round(slot.y)));
          return {
            panel_key: slot.panel_key || "",
            name: slot.name || "",
            x,
            y,
            w: Math.max(1, Math.min(canvas.width - x, Math.round(slot.w))),
            h: Math.max(1, Math.min(canvas.height - y, Math.round(slot.h)))
          };
        }) : []
      };

      if (keyboardRectTouched) {
        const keyboard = sourceKeyboardRect();
        const x = Math.min(canvas.width - 1, Math.max(0, Math.round(keyboard.x)));
        const y = Math.min(canvas.height - 1, Math.max(0, Math.round(keyboard.y)));
        payload.keyboard_rect = {
          x,
          y,
          w: Math.max(1, Math.min(canvas.width - x, Math.round(keyboard.w))),
          h: Math.max(1, Math.min(canvas.height - y, Math.round(keyboard.h)))
        };
      }

      return JSON.stringify(payload);
    }

    function makeFormData(extra = {}) {
      const design = $("designFile").files[0];
      const basePackage = $("basePackage").files[0];
      if (!design || !basePackage) {
        throw new Error("请先选择设计稿和目标底包。");
      }

      // FastAPI 用同一组字段处理分析、预览、导出，所以前端统一构造 FormData。
      const form = new FormData();
      form.append("design_file", design);
      form.append("base_package", basePackage);
      form.append("panels", selectedPanels());
      form.append("size_basis", $("sizeBasis").value);
      form.append("layout_basis", $("layoutBasis").value);
      form.append("resize_mode", $("resizeMode").value);
      form.append("layer_mode", $("layerMode").value);
      form.append("include_pressed", $("includePressed").checked ? "true" : "false");
      form.append("darken_pressed", $("darkenPressed").checked ? "true" : "false");
      form.append("source_layout", buildSourceLayoutPayload());
      Object.entries(extra).forEach(([key, value]) => form.append(key, value));
      return form;
    }

    function ensureSourceCanvasFromImage(width, height, overwriteCanvas = false) {
      if (!$("sourceCanvasW").value) $("sourceCanvasW").value = width;
      if (!$("sourceCanvasH").value) $("sourceCanvasH").value = height;
      if (overwriteCanvas) {
        $("sourceCanvasW").value = width;
        $("sourceCanvasH").value = height;
        sourceMappingTouched = true;
      }
      if (!$("sourceRatioW").value) $("sourceRatioW").value = width;
      if (!$("sourceRatioH").value) $("sourceRatioH").value = height;
      $("sourceImageW").value = width;
      $("sourceImageH").value = height;
      renderSourceSlots();
    }

    function fillSourceImageFromAnalyze(data) {
      const source = data?.sources?.[0];
      const width = Number(source?.size?.[0]);
      const height = Number(source?.size?.[1]);
      if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) return;
      ensureSourceCanvasFromImage(width, height, false);
      setSourceLayoutStatus(`后端已识别设计稿渲染尺寸：${width} × ${height}`, "ok");
    }

    async function loadDesignImageInfo() {
      const file = $("designFile").files[0];
      if (!file) throw new Error("请先选择设计稿。");
      if (sourcePreviewUrl) URL.revokeObjectURL(sourcePreviewUrl);
      sourcePreviewUrl = URL.createObjectURL(file);
      const img = $("sourceImagePreview");
      const info = await new Promise((resolve, reject) => {
        const probe = new Image();
        probe.onload = () => resolve({ width: probe.naturalWidth, height: probe.naturalHeight });
        probe.onerror = () => reject(new Error("无法读取图片尺寸；PSD 请先用整体逻辑尺寸手动填写。"));
        probe.src = sourcePreviewUrl;
      });
      img.src = sourcePreviewUrl;
      img.style.display = "block";
      ensureSourceCanvasFromImage(info.width, info.height);
      return info;
    }

    async function loadDesignSourceInfo() {
      const file = $("designFile").files[0];
      if (!file) throw new Error("请先选择设计稿。");

      const form = new FormData();
      form.append("design_file", file);
      const response = await fetch("/api/source-info", { method: "POST", body: form });
      if (!response.ok) throw new Error(await parseError(response));
      const data = await response.json();
      const source = data?.sources?.[0];
      const width = Number(source?.size?.[0]);
      const height = Number(source?.size?.[1]);
      if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) {
        throw new Error("后端没有识别到有效的设计稿尺寸。");
      }
      ensureSourceCanvasFromImage(width, height, true);
      return { width, height };
    }

    function renderSourceSlots() {
      const canvas = $("sourceCanvas");
      const image = $("sourceImagePreview");
      const canvasSize = sourceCanvasSize();
      const visualWidth = canvas.clientWidth || image.clientWidth || 1;
      const ratio = canvasSize.width > 0 ? visualWidth / canvasSize.width : 1;
      const visualHeight = canvasSize.height > 0 ? Math.max(220, Math.round(canvasSize.height * ratio)) : 220;
      canvas.style.minHeight = `${visualHeight}px`;
      image.style.height = image.src ? `${visualHeight}px` : "";
      image.style.display = image.src ? "block" : "none";

      Array.from(canvas.querySelectorAll(".grid-slot")).forEach((node) => node.remove());
      const allSlots = draftSlot ? sourceSlots.concat([draftSlot]) : sourceSlots;
      allSlots.forEach((slot, index) => {
        const div = document.createElement("div");
        div.className = `grid-slot ${index === activeSlotIndex ? "active" : ""} ${slot === draftSlot ? "draft" : ""}`;
        div.style.left = `${slot.x * ratio}px`;
        div.style.top = `${slot.y * ratio}px`;
        div.style.width = `${Math.max(1, slot.w * ratio)}px`;
        div.style.height = `${Math.max(1, slot.h * ratio)}px`;
        div.textContent = slot.name || `${Math.round(slot.w)}×${Math.round(slot.h)}`;
        div.addEventListener("pointerdown", (event) => event.stopPropagation());
        div.addEventListener("click", (event) => {
          event.stopPropagation();
          if (slot !== draftSlot) {
            activeSlotIndex = index;
            renderSourceSlots();
          }
        });
        canvas.appendChild(div);
      });

      $("slotCount").textContent = `${sourceSlots.length} 个格子`;
      renderSlotTable();
    }

    function renderSlotTable() {
      const body = $("slotTableBody");
      body.innerHTML = "";
      sourceSlots.forEach((slot, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><input data-field="name" data-index="${index}" type="text" value="${escapeHtml(slot.name || "")}" /></td>
          <td><input data-field="panel_key" data-index="${index}" type="text" value="${escapeHtml(slot.panel_key || "")}" /></td>
          <td><input data-field="x" data-index="${index}" type="number" value="${Math.round(slot.x)}" /></td>
          <td><input data-field="y" data-index="${index}" type="number" value="${Math.round(slot.y)}" /></td>
          <td><input data-field="w" data-index="${index}" type="number" value="${Math.round(slot.w)}" /></td>
          <td><input data-field="h" data-index="${index}" type="number" value="${Math.round(slot.h)}" /></td>
          <td><button type="button" data-delete="${index}" class="secondary">删</button></td>
        `;
        if (index === activeSlotIndex) row.style.background = "#fff7f8";
        body.appendChild(row);
      });
    }

    function replaceSlots(slots, message) {
      sourceSlots.splice(0, sourceSlots.length, ...slots);
      activeSlotIndex = sourceSlots.length ? 0 : -1;
      $("sourceLayoutMode").value = sourceSlots.length ? "custom" : "none";
      renderSourceSlots();
      if (message) setSourceLayoutStatus(message, "ok");
    }

    function py26TemplateSlots(rect) {
      const sx = rect.w / PY26_BASE_W;
      const sy = rect.h / PY26_BASE_H;
      const panelKey = currentSourcePanelKey();
      return PY26_POSITION_PRESET.map(([name, x, y, w, h]) => ({
        panel_key: panelKey,
        name,
        x: rect.x + x * sx,
        y: rect.y + y * sy,
        w: w * sx,
        h: h * sy
      }));
    }

    function slotsFromAnalyze(panelKey = currentSourcePanelKey()) {
      const panel = lastAnalyzeData?.skin?.panels?.find((item) => item.panel_key === panelKey) || lastAnalyzeData?.skin?.panels?.[0];
      if (!panel || !panel.keys?.length) throw new Error("请先分析底包，才能用底包格子生成。");
      $("sourcePanelKey").value = panel.panel_key;
      const canvas = sourceCanvasSize();
      if (!canvas.width) $("sourceCanvasW").value = panel.size[0];
      if (!canvas.height) $("sourceCanvasH").value = panel.size[1];
      refreshKeyboardRectDefault();
      const rect = sourceKeyboardRect();
      const sx = rect.w / Math.max(1, panel.size[0]);
      const sy = rect.h / Math.max(1, panel.size[1]);
      return panel.keys.map((key) => ({
        panel_key: panel.panel_key,
        name: key.name,
        x: rect.x + key.x * sx,
        y: rect.y + key.y * sy,
        w: key.w * sx,
        h: key.h * sy
      }));
    }

    function canvasPoint(event) {
      const canvas = $("sourceCanvas");
      const rect = canvas.getBoundingClientRect();
      const canvasSize = sourceCanvasSize();
      const ratio = canvasSize.width > 0 ? rect.width / canvasSize.width : 1;
      return {
        x: Math.min(canvasSize.width || 0, Math.max(0, (event.clientX - rect.left) / ratio)),
        y: Math.min(canvasSize.height || 0, Math.max(0, (event.clientY - rect.top) / ratio))
      };
    }

    async function parseError(response) {
      try {
        const data = await response.json();
        return data.detail || JSON.stringify(data);
      } catch (_) {
        return await response.text();
      }
    }

    async function postJson(url) {
      const response = await fetch(url, { method: "POST", body: makeFormData() });
      if (!response.ok) throw new Error(await parseError(response));
      return response.json();
    }

    async function downloadFrom(url, filename) {
      const response = await fetch(url, { method: "POST", body: makeFormData() });
      if (!response.ok) throw new Error(await parseError(response));
      const blob = await response.blob();
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      URL.revokeObjectURL(link.href);
      link.remove();
    }

    $("analyzeBtn").addEventListener("click", async () => {
      try {
        setBusy(true);
        setStatus("正在分析 PSD 和底包结构...");
        const data = await postJson("/api/analyze");
        lastAnalyzeData = data;
        fillSourceImageFromAnalyze(data);
        $("report").textContent = JSON.stringify(data, null, 2);
        setStatus("分析完成。", "ok");
      } catch (error) {
        setStatus(error.message, "bad");
      } finally {
        setBusy(false);
      }
    });

    $("designFile").addEventListener("change", async () => {
      try {
        await loadDesignImageInfo();
        const size = sourceCanvasSize();
        setSourceLayoutStatus(`已识别设计图尺寸：${size.width} × ${size.height}`, "ok");
      } catch (error) {
        setSourceLayoutStatus(error.message, "warn");
      }
    });

    $("detectImageSizeBtn").addEventListener("click", async () => {
      try {
        let info;
        try {
          info = await loadDesignImageInfo();
          ensureSourceCanvasFromImage(info.width, info.height, true);
        } catch (_) {
          info = await loadDesignSourceInfo();
        }
        sourceMappingTouched = true;
        renderSourceSlots();
        setSourceLayoutStatus(`已使用图片实际尺寸：${info.width} × ${info.height}`, "ok");
      } catch (error) {
        setSourceLayoutStatus(error.message, "bad");
      }
    });

    $("applyRatioBtn").addEventListener("click", () => {
      const w = numValue("sourceRatioW", 0);
      const h = numValue("sourceRatioH", 0);
      if (!w || !h) {
        setSourceLayoutStatus("请先填写宽比和高比。", "bad");
        return;
      }
      $("sourceCanvasW").value = w;
      $("sourceCanvasH").value = h;
      sourceMappingTouched = true;
      refreshKeyboardRectDefault();
      renderSourceSlots();
      setSourceLayoutStatus(`已应用整体宽高：${w} × ${h}，无格子时也会按这个比例裁切。`, "ok");
    });

    $("generate26Btn").addEventListener("click", () => {
      const size = sourceCanvasSize();
      const width = size.width || 1080;
      const height = size.height || 750;
      $("sourceCanvasW").value = width;
      $("sourceCanvasH").value = height;
      refreshKeyboardRectDefault();
      const rect = sourceKeyboardRect();
      replaceSlots(py26TemplateSlots(rect), `已按小程序 26 键模板生成格子：整体 ${width}×${height}，键盘区 ${Math.round(rect.x)},${Math.round(rect.y)},${Math.round(rect.w)},${Math.round(rect.h)}`);
    });

    $("generateFromBaseBtn").addEventListener("click", () => {
      try {
        const panelKey = currentSourcePanelKey();
        replaceSlots(slotsFromAnalyze(panelKey), `已使用底包 ${panelKey} 格子生成源模板。`);
      } catch (error) {
        setSourceLayoutStatus(error.message, "bad");
      }
    });

    $("addSlotBtn").addEventListener("click", () => {
      const size = sourceCanvasSize();
      if (!size.width || !size.height) {
        $("sourceCanvasW").value = 1080;
        $("sourceCanvasH").value = 595;
      }
      refreshKeyboardRectDefault();
      sourceSlots.push({ panel_key: currentSourcePanelKey(), name: `格子${sourceSlots.length + 1}`, x: 0, y: 0, w: 100, h: 100 });
      activeSlotIndex = sourceSlots.length - 1;
      $("sourceLayoutMode").value = "custom";
      renderSourceSlots();
    });

    $("clearSlotsBtn").addEventListener("click", () => {
      replaceSlots([], "已清空源图片格子。");
      $("sourceLayoutMode").value = "none";
    });

    $("slotTableBody").addEventListener("change", (event) => {
      const target = event.target;
      const index = Number(target.dataset.index);
      const field = target.dataset.field;
      if (!Number.isInteger(index) || !sourceSlots[index] || !field) return;
      if (field === "name" || field === "panel_key") {
        sourceSlots[index][field] = target.value;
      } else {
        sourceSlots[index][field] = Number(target.value) || 0;
        if (field === "w" || field === "h") sourceSlots[index][field] = Math.max(1, sourceSlots[index][field]);
      }
      activeSlotIndex = index;
      renderSourceSlots();
    });

    $("slotTableBody").addEventListener("click", (event) => {
      const deleteIndex = event.target.dataset.delete;
      if (deleteIndex === undefined) return;
      sourceSlots.splice(Number(deleteIndex), 1);
      activeSlotIndex = Math.min(sourceSlots.length - 1, activeSlotIndex);
      renderSourceSlots();
    });

    $("sourceCanvas").addEventListener("pointerdown", (event) => {
      if ($("sourceLayoutMode").value !== "custom") $("sourceLayoutMode").value = "custom";
      const size = sourceCanvasSize();
      if (!size.width || !size.height) {
        setSourceLayoutStatus("请先填写源图片整体宽高。", "bad");
        return;
      }
      dragStart = canvasPoint(event);
      draftSlot = { panel_key: currentSourcePanelKey(), name: `格子${sourceSlots.length + 1}`, x: dragStart.x, y: dragStart.y, w: 1, h: 1 };
      $("sourceCanvas").setPointerCapture(event.pointerId);
      renderSourceSlots();
    });

    $("sourceCanvas").addEventListener("pointermove", (event) => {
      if (!dragStart || !draftSlot) return;
      const point = canvasPoint(event);
      draftSlot.x = Math.min(dragStart.x, point.x);
      draftSlot.y = Math.min(dragStart.y, point.y);
      draftSlot.w = Math.max(1, Math.abs(point.x - dragStart.x));
      draftSlot.h = Math.max(1, Math.abs(point.y - dragStart.y));
      renderSourceSlots();
    });

    $("sourceCanvas").addEventListener("pointerup", (event) => {
      if (!dragStart || !draftSlot) return;
      $("sourceCanvas").releasePointerCapture(event.pointerId);
      if (draftSlot.w >= 3 && draftSlot.h >= 3) {
        sourceSlots.push({ ...draftSlot });
        activeSlotIndex = sourceSlots.length - 1;
        setSourceLayoutStatus("已添加手绘格子，可在表格里修改键名和参数。", "ok");
      }
      draftSlot = null;
      dragStart = null;
      renderSourceSlots();
    });

    $("sourceCanvas").addEventListener("pointercancel", () => {
      draftSlot = null;
      dragStart = null;
      renderSourceSlots();
    });

    ["sourceCanvasW", "sourceCanvasH"].forEach((id) => {
      $(id).addEventListener("input", () => {
        sourceMappingTouched = true;
        refreshKeyboardRectDefault();
        renderSourceSlots();
      });
    });

    ["sourceKeyboardX", "sourceKeyboardY", "sourceKeyboardW", "sourceKeyboardH"].forEach((id) => {
      $(id).addEventListener("input", () => {
        keyboardRectTouched = true;
        sourceMappingTouched = true;
        renderSourceSlots();
      });
    });

    $("previewBtn").addEventListener("click", async () => {
      try {
        setBusy(true);
        setStatus("正在生成预览...");
        const data = await postJson("/api/preview");
        $("report").textContent = JSON.stringify({
          replaced_files: data.replaced_files,
          diagnostics: data.diagnostics
        }, null, 2);
        const container = $("previews");
        container.innerHTML = "";
        data.previews.forEach((preview) => {
          const card = document.createElement("div");
          card.className = "preview-card";
          card.innerHTML = `
            <div class="preview-meta">
              <strong>${preview.title}</strong>
              <span>${preview.width} × ${preview.height} · ${preview.source}</span>
            </div>
            <img alt="${preview.title}" src="${preview.data_url}" />
          `;
          container.appendChild(card);
        });
        setStatus(`预览完成，共 ${data.previews.length} 个面板。`, "ok");
      } catch (error) {
        setStatus(error.message, "bad");
      } finally {
        setBusy(false);
      }
    });

    $("psdBtn").addEventListener("click", async () => {
      try {
        setBusy(true);
        setStatus("正在导出 PSD...");
        await downloadFrom("/api/export-psd", "skin_auto_adapt.psd");
        setStatus("PSD 已生成。", "ok");
      } catch (error) {
        setStatus(error.message, "bad");
      } finally {
        setBusy(false);
      }
    });

    $("packageBtn").addEventListener("click", async () => {
      try {
        setBusy(true);
        setStatus("正在导出新底包...");
        const base = $("basePackage").files[0];
        const ext = base && /\.[^.]+$/.test(base.name) ? base.name.match(/\.[^.]+$/)[0] : ".bds";
        await downloadFrom("/api/export-package", `skin_auto_adapt${ext}`);
        setStatus("新底包已生成。", "ok");
      } catch (error) {
        setStatus(error.message, "bad");
      } finally {
        setBusy(false);
      }
    });

    async function checkHealth() {
      try {
        const response = await fetch("/health");
        const data = await response.json();
        $("health").className = "status ok";
        $("health").textContent = data.ok ? "本地服务已连接" : "本地服务异常";
      } catch (_) {
        $("health").className = "status bad";
        $("health").textContent = "无法连接本地服务";
      }
    }

    checkHealth();
  </script>
</body>
</html>
